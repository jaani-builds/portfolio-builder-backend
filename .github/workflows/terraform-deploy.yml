name: Terraform Deploy (Production - OIDC)

# Runs on push to main after bootstrap-terraform.yml has completed
# Prerequisites: AWS_ROLE_ARN secret must be set (from bootstrap workflow)
# 
# To enable this workflow:
# 1. Run bootstrap-terraform.yml workflow manually
# 2. Add the github_role_arn output as GitHub secret: AWS_ROLE_ARN
# 3. Delete bootstrap-terraform.yml
# 4. Push code to main

on:
  push:
    branches:
      - main
    paths:
      - 'infra/terraform/**'
      - 'app/**'
      - 'lambda_handler.py'
      - 'requirements.txt'
      - '.github/workflows/terraform-deploy.yml'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  terraform:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ap-southeast-1
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      TF_VAR_aws_region: ap-southeast-1
      TF_VAR_project_name: portfolio-builder
      TF_VAR_environment: prod
      TF_VAR_frontend_url: ${{ vars.FRONTEND_URL || 'https://portfolio-builder-frontend.jaanifrancis.workers.dev' }}
      TF_VAR_github_client_id: ${{ secrets.OAUTH_CLIENT_ID }}
      TF_VAR_github_client_secret: ${{ secrets.OAUTH_CLIENT_SECRET }}
      TF_VAR_google_client_id: ${{ secrets.GOOGLE_CLIENT_ID }}
      TF_VAR_google_client_secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      TF_VAR_linkedin_client_id: ${{ secrets.LINKEDIN_CLIENT_ID }}
      TF_VAR_linkedin_client_secret: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
      TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
      TF_VAR_alert_email: ${{ vars.ALERT_EMAIL || 'jaaninickolas@icloud.com' }}
      TF_VAR_lambda_memory_size: "128"
      TF_VAR_lambda_timeout: "15"
      TF_VAR_lambda_zip_path: ../../dist/lambda.zip
      TF_VAR_log_retention_days: "3"
      TF_VAR_monthly_budget_limit_usd: "5"
      TF_VAR_budget_alert_threshold_percent: "80"
      TF_VAR_create_billing_alarm: "false"
      TF_VAR_enable_api_gateway_access_logs: "false"
      TF_VAR_enable_operational_alarms: "false"
      TF_VAR_enable_operations_dashboard: "false"
      TF_VAR_api_custom_domain: ${{ vars.API_CUSTOM_DOMAIN || '' }}
      TF_VAR_api_acm_certificate_arn: ${{ vars.API_ACM_CERTIFICATE_ARN || '' }}
      TF_VAR_portfolio_custom_domain: ${{ vars.PORTFOLIO_CUSTOM_DOMAIN || '' }}
      TF_VAR_portfolio_acm_certificate_arn: ${{ vars.PORTFOLIO_ACM_CERTIFICATE_ARN || '' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.14.8

      - name: Configure AWS credentials via OIDC (no stored secrets)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Lambda zip
        run: |
          set -euo pipefail
          rm -rf dist build
          mkdir -p build/python dist
          python3 -m pip install -q -r requirements.txt -t build/python
          cp -R app lambda_handler.py build/python/

          # Include static portfolio template expected by PORTFOLIO_TEMPLATE_DIR=/var/task/portfolio_template
          git clone --depth 1 https://github.com/jaani-builds/jaani-builds.github.io.git build/template-src
          mkdir -p build/python/portfolio_template
          cp -R build/template-src/index.html build/template-src/assets build/template-src/data build/python/portfolio_template/

          cd build/python
          zip -q -r "../../dist/lambda.zip" .
          cd ../..
          echo "Lambda zip size: $(du -sh dist/lambda.zip | cut -f1)"

      - name: Terraform Init
        working-directory: infra/terraform
        run: terraform init

      - name: Terraform Format Check
        working-directory: infra/terraform
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        working-directory: infra/terraform
        run: terraform validate

      - name: Apply IAM Resources First
        working-directory: infra/terraform
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        run: |
          terraform apply -auto-approve \
            -target=aws_iam_openid_connect_provider.github \
            -target=aws_iam_role.github_terraform \
            -target=aws_iam_role_policy.github_terraform \
            -target=aws_iam_role.lambda \
            -target=aws_iam_role_policy.lambda || true
          sleep 10
        env:
          TF_LOG: INFO

      - name: Terraform Plan
        working-directory: infra/terraform
        run: terraform plan -refresh=false -out=tfplan
        env:
          TF_LOG: INFO

      - name: Terraform Apply
        working-directory: infra/terraform
        if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        run: terraform apply -auto-approve tfplan

      - name: Export Deployment Outputs
        working-directory: infra/terraform
        if: always()
        # outputs: api_base_url, api_custom_domain_target, portfolio_custom_domain_target
        run: |
          API_BASE_URL="$(terraform output -raw api_base_url 2>/dev/null || true)"
          API_CUSTOM_DOMAIN_TARGET="$(terraform output -raw api_custom_domain_target 2>/dev/null || true)"
          PORTFOLIO_CUSTOM_DOMAIN_TARGET="$(terraform output -raw portfolio_custom_domain_target 2>/dev/null || true)"
          LAMBDA_NAME="$(terraform output -raw lambda_function_name 2>/dev/null || true)"
          {
            echo "## Deployment Outputs"
            echo "- api_base_url: ${API_BASE_URL}"
            echo "- api_custom_domain_target: ${API_CUSTOM_DOMAIN_TARGET}"
            echo "- portfolio_custom_domain_target: ${PORTFOLIO_CUSTOM_DOMAIN_TARGET}"
            echo "- lambda_function_name: ${LAMBDA_NAME}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Terraform State
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-state
          path: infra/terraform/
          retention-days: 5
