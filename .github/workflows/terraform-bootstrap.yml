name: Terraform Bootstrap (ONE-TIME SETUP)

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/terraform-bootstrap.yml'
      - 'infra/terraform/github-oidc.tf'
      - 'infra/terraform/versions.tf'
      - 'infra/terraform/variables.tf'
      - 'infra/terraform/backend.tf'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ap-southeast-1
      TF_IN_AUTOMATION: "true"
      TF_INPUT: "false"
      TF_VAR_aws_region: ap-southeast-1
      TF_VAR_project_name: portfolio-builder
      TF_VAR_environment: prod
      TF_VAR_frontend_url: ${{ vars.FRONTEND_URL || 'https://portfolio-builder-frontend.jaanifrancis.workers.dev' }}
      TF_VAR_github_client_id: ${{ secrets.OAUTH_CLIENT_ID }}
      TF_VAR_github_client_secret: ${{ secrets.OAUTH_CLIENT_SECRET }}
      TF_VAR_jwt_secret: ${{ secrets.JWT_SECRET }}
      TF_VAR_alert_email: ${{ vars.ALERT_EMAIL || 'jaaninickolas@icloud.com' }}
      TF_VAR_lambda_memory_size: "128"
      TF_VAR_lambda_timeout: "15"
      TF_VAR_log_retention_days: "3"
      TF_VAR_monthly_budget_limit_usd: "5"
      TF_VAR_budget_alert_threshold_percent: "80"
      TF_VAR_create_billing_alarm: "false"
      TF_VAR_enable_api_gateway_access_logs: "false"
      TF_VAR_enable_operational_alarms: "false"
      TF_VAR_enable_operations_dashboard: "false"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.14.8

      - name: Configure AWS credentials (temporary - for bootstrap only)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS Account
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "AWS Account: $ACCOUNT_ID"
          if [ "$ACCOUNT_ID" != "353695642481" ]; then
            echo "ERROR: Wrong AWS account! Expected 353695642481, got $ACCOUNT_ID"
            exit 1
          fi

      - name: Ensure Terraform Backend Resources
        run: |
          set -euo pipefail

          BACKEND_BUCKET="portfolio-builder-terraform-state-353695642481-apse1"
          LOCK_TABLE="terraform-locks"

          if aws s3api head-bucket --bucket "$BACKEND_BUCKET" 2>/dev/null; then
            echo "Backend bucket already exists: $BACKEND_BUCKET"
          else
            aws s3api create-bucket \
              --bucket "$BACKEND_BUCKET" \
              --region "$AWS_REGION" \
              --create-bucket-configuration LocationConstraint="$AWS_REGION"
            echo "Created backend bucket: $BACKEND_BUCKET"
          fi

          aws s3api put-bucket-versioning \
            --bucket "$BACKEND_BUCKET" \
            --versioning-configuration Status=Enabled

          aws s3api put-bucket-encryption \
            --bucket "$BACKEND_BUCKET" \
            --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'

          aws s3api put-public-access-block \
            --bucket "$BACKEND_BUCKET" \
            --public-access-block-configuration BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true

          if aws dynamodb describe-table --table-name "$LOCK_TABLE" --region "$AWS_REGION" >/dev/null 2>&1; then
            echo "Lock table already exists: $LOCK_TABLE"
          else
            aws dynamodb create-table \
              --table-name "$LOCK_TABLE" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region "$AWS_REGION"
            aws dynamodb wait table-exists --table-name "$LOCK_TABLE" --region "$AWS_REGION"
            echo "Created lock table: $LOCK_TABLE"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Lambda zip
        run: |
          set -euo pipefail
          rm -rf dist build
          mkdir -p build/python dist
          python3 -m pip install -q -r requirements.txt -t build/python
          cp -R app lambda_handler.py build/python/
          cd build/python
          zip -q -r "../../dist/lambda.zip" .
          cd ../..
          echo "Lambda zip size: $(du -sh dist/lambda.zip | cut -f1)"

      - name: Terraform Init
        working-directory: infra/terraform
        run: terraform init -reconfigure

      - name: Import Existing Bootstrap Resources
        working-directory: infra/terraform
        run: |
          set -euo pipefail

          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)

          import_if_needed() {
            local address="$1"
            local import_id="$2"

            if terraform state list | grep -Fxq "$address"; then
              echo "State already contains $address, removing stale entry first"
              terraform state rm "$address" || true
            fi

            echo "Importing $address"
            terraform import -input=false "$address" "$import_id" || echo "Import of $address skipped (may already exist)"
          }

          GITHUB_OIDC_ARN="arn:aws:iam::${ACCOUNT_ID}:oidc-provider/token.actions.githubusercontent.com"
          GITHUB_TERRAFORM_ROLE="portfolio-builder-prod-github-terraform-role"
          GITHUB_TERRAFORM_POLICY="portfolio-builder-prod-github-terraform-policy"
          LAMBDA_ROLE="portfolio-builder-prod-lambda-role"
          LAMBDA_POLICY="portfolio-builder-prod-lambda-policy"
          MONTHLY_BUDGET="portfolio-builder-prod-monthly-cost-budget"

          if aws iam get-open-id-connect-provider --open-id-connect-provider-arn "$GITHUB_OIDC_ARN" >/dev/null 2>&1; then
            import_if_needed "aws_iam_openid_connect_provider.github" "$GITHUB_OIDC_ARN"
          fi

          if aws iam get-role --role-name "$GITHUB_TERRAFORM_ROLE" >/dev/null 2>&1; then
            import_if_needed "aws_iam_role.github_terraform" "$GITHUB_TERRAFORM_ROLE"
          fi

          if aws iam get-role-policy --role-name "$GITHUB_TERRAFORM_ROLE" --policy-name "$GITHUB_TERRAFORM_POLICY" >/dev/null 2>&1; then
            import_if_needed "aws_iam_role_policy.github_terraform" "${GITHUB_TERRAFORM_ROLE}:${GITHUB_TERRAFORM_POLICY}"
          fi

          if aws iam get-role --role-name "$LAMBDA_ROLE" >/dev/null 2>&1; then
            import_if_needed "aws_iam_role.lambda" "$LAMBDA_ROLE"
          fi

          if aws iam get-role-policy --role-name "$LAMBDA_ROLE" --policy-name "$LAMBDA_POLICY" >/dev/null 2>&1; then
            import_if_needed "aws_iam_role_policy.lambda" "${LAMBDA_ROLE}:${LAMBDA_POLICY}"
          fi

          if [ "${TF_VAR_create_billing_alarm}" = "true" ] && aws budgets describe-budget --account-id "$ACCOUNT_ID" --budget-name "$MONTHLY_BUDGET" >/dev/null 2>&1; then
            import_if_needed "aws_budgets_budget.monthly[0]" "${ACCOUNT_ID}:${MONTHLY_BUDGET}"
          fi

      - name: Terraform Plan Bootstrap
        working-directory: infra/terraform
        run: |
            terraform plan -out=tfplan

      - name: Terraform Apply Bootstrap
        working-directory: infra/terraform
        run: terraform apply -auto-approve tfplan

      - name: Extract GitHub OIDC Role ARN
        run: |
          ROLE_ARN=$(aws iam get-role \
            --role-name "portfolio-builder-prod-github-terraform-role" \
            --query "Role.Arn" \
            --output text)
          echo "github_role_arn=$ROLE_ARN" >> $GITHUB_OUTPUT
          echo "GitHub OIDC Role ARN: $ROLE_ARN"
        id: output

      - name: Display Next Steps
        run: |
          cat << 'EOF'
          ✅ Bootstrap Complete!
          
          Next steps:
          1. Add this GitHub secret (Settings → Secrets and variables → Actions):
             Name: AWS_ROLE_ARN
             Value: ${{ steps.output.outputs.github_role_arn }}
          
          2. Delete AWS credential secrets:
             - AWS_ACCESS_KEY_ID
             - AWS_SECRET_ACCESS_KEY
          
          3. Delete this workflow file:
             .github/workflows/terraform-bootstrap.yml

           4. Delete temporary bootstrap AWS secrets:
             - AWS_ACCESS_KEY_ID
             - AWS_SECRET_ACCESS_KEY

           5. Push to trigger the permanent OIDC-based deployment workflow
          
          After that, all deployments will use OIDC (no stored secrets).
          EOF
